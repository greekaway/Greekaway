<!doctype html>
<html lang="el">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Μηνιαίες Υποχρεώσεις – DriversSystem</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/driverssystem/icons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/driverssystem/icons/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/driverssystem/icons/apple-touch-icon.png">
    <link rel="preload" href="/driverssystem/css/driverssystem-base.css" as="style" />
    <link rel="preload" href="/driverssystem/css/obligations.css" as="style" />
    <link rel="preload" href="/driverssystem/js/driverssystem-config.js" as="script" />
    <link rel="preload" href="/driverssystem/js/obligations.js" as="script" />
    <link rel="stylesheet" href="/driverssystem/css/auth-gate.css" />
    <script>if(!localStorage.getItem('ds_driver_phone')){document.documentElement.className+=' ds-gate-pending'}</script>
    <link rel="stylesheet" href="/driverssystem/css/driverssystem-base.css" />
    <link rel="stylesheet" href="/driverssystem/css/footer.css" />
    <link rel="stylesheet" href="/driverssystem/css/page-loader.css" />
    <link rel="stylesheet" href="/driverssystem/css/obligations.css" />
    <link rel="stylesheet" href="/driverssystem/css/dark-mode.css" media="(prefers-color-scheme: dark)" />
  </head>
  <body class="ds-obl-page">

    <!-- ─── Back Arrow ─── -->
    <header class="ds-obl-back-header">
      <button class="ds-obl-back-btn" data-ds-obl-back aria-label="Πίσω">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <h2 class="ds-obl-page-title">Μηνιαίες Υποχρεώσεις</h2>
    </header>

    <!-- ─── Main Content ─── -->
    <main class="ds-obl-main">

      <!-- ── Summary Cards ── -->
      <div class="ds-obl-summary">
        <div class="ds-obl-summary-card ds-obl-summary-card--incoming">
          <span class="ds-obl-summary-card__label">Μου χρωστάνε</span>
          <span class="ds-obl-summary-card__amount" data-ds-obl-total-incoming>0,00 €</span>
          <span class="ds-obl-summary-card__missed" data-ds-obl-missed-incoming></span>
        </div>
        <div class="ds-obl-summary-card ds-obl-summary-card--outgoing">
          <span class="ds-obl-summary-card__label">Χρωστάω</span>
          <span class="ds-obl-summary-card__amount" data-ds-obl-total-outgoing>0,00 €</span>
          <span class="ds-obl-summary-card__missed" data-ds-obl-missed-outgoing></span>
        </div>
      </div>

      <!-- ── Filter Pills ── -->
      <div class="ds-obl-filters" data-ds-obl-filters>
        <button class="ds-obl-filter active" data-ds-obl-filter="all">Όλα</button>
        <button class="ds-obl-filter" data-ds-obl-filter="incoming">Μου χρωστάνε</button>
        <button class="ds-obl-filter" data-ds-obl-filter="outgoing">Χρωστάω</button>
      </div>

      <!-- ── Obligation Cards List ── -->
      <section class="ds-obl-list" data-ds-obl-list>
        <div class="ds-obl-empty" data-ds-obl-empty>
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="opacity:.35; margin-bottom:8px"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          <span>Δεν υπάρχουν υποχρεώσεις ακόμα</span>
        </div>
      </section>

      <!-- ── Add New Button (FAB) ── -->
      <button class="ds-obl-fab" data-ds-obl-add aria-label="Νέα υποχρέωση">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>

    </main>

    <!-- ═══════════════════════════════════════
         ADD / EDIT OBLIGATION OVERLAY
         ═══════════════════════════════════════ -->
    <div class="ds-obl-overlay" data-ds-obl-overlay style="display:none">
      <div class="ds-obl-dialog ds-card">
        <h3 class="ds-obl-dialog__title" data-ds-obl-dialog-title>Νέα Υποχρέωση</h3>
        <form data-ds-obl-form>
          <input type="hidden" data-ds-obl-edit-id />

          <div class="ds-obl-field">
            <label class="ds-obl-field__label">Τίτλος</label>
            <input class="ds-obl-field__input" type="text" placeholder="π.χ. Ενοίκιο γραφείου"
                   maxlength="120" data-ds-obl-title required />
          </div>

          <div class="ds-obl-field">
            <label class="ds-obl-field__label">Αντισυμβαλλόμενος</label>
            <input class="ds-obl-field__input" type="text" placeholder="π.χ. Γιάννης Παπαδόπουλος"
                   maxlength="120" data-ds-obl-counterparty />
          </div>

          <div class="ds-obl-field">
            <label class="ds-obl-field__label">Ποσό (€)</label>
            <input class="ds-obl-field__input" type="number" inputmode="decimal" step="0.01" min="0"
                   placeholder="0,00" data-ds-obl-amount required />
          </div>

          <div class="ds-obl-field">
            <label class="ds-obl-field__label">Κατεύθυνση</label>
            <div class="ds-obl-direction-toggle" data-ds-obl-direction-toggle>
              <button type="button" class="ds-obl-dir-btn active" data-ds-obl-dir="incoming">Μου χρωστάνε</button>
              <button type="button" class="ds-obl-dir-btn" data-ds-obl-dir="outgoing">Χρωστάω</button>
            </div>
            <input type="hidden" data-ds-obl-direction value="incoming" />
          </div>

          <div class="ds-obl-field">
            <label class="ds-obl-field__label">Συχνότητα</label>
            <select class="ds-obl-field__input" data-ds-obl-frequency>
              <option value="monthly">Μηνιαία</option>
              <option value="quarterly">Τριμηνιαία</option>
              <option value="yearly">Ετήσια</option>
            </select>
          </div>

          <div class="ds-obl-field">
            <label class="ds-obl-field__label">Ημ/νία έναρξης</label>
            <input class="ds-obl-field__input" type="date" data-ds-obl-start-date />
          </div>

          <div class="ds-obl-actions">
            <button type="button" class="ds-obl-btn ds-obl-btn--cancel" data-ds-obl-cancel>Ακύρωση</button>
            <button type="button" class="ds-obl-btn ds-obl-btn--delete" data-ds-obl-delete style="display:none">Διαγραφή</button>
            <button type="submit" class="ds-obl-btn ds-obl-btn--save">Αποθήκευση</button>
          </div>
        </form>
      </div>
    </div>

    <!-- ═══════════════════════════════════════
         OBLIGATION DETAIL / HISTORY VIEW
         ═══════════════════════════════════════ -->
    <div class="ds-obl-detail-view" data-ds-obl-detail-view style="display:none">

      <header class="ds-obl-detail-header">
        <button class="ds-obl-detail-back-btn" data-ds-obl-detail-back aria-label="Πίσω">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <h2 class="ds-obl-detail-title" data-ds-obl-detail-title>—</h2>
        <button class="ds-obl-detail-edit-btn" data-ds-obl-detail-edit aria-label="Επεξεργασία">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
      </header>

      <!-- Detail summary -->
      <div class="ds-obl-detail-info">
        <div class="ds-obl-detail-row">
          <span class="ds-obl-detail-label">Αντισυμβαλλόμενος</span>
          <span class="ds-obl-detail-value" data-ds-obl-detail-counterparty>—</span>
        </div>
        <div class="ds-obl-detail-row">
          <span class="ds-obl-detail-label">Ποσό</span>
          <span class="ds-obl-detail-value" data-ds-obl-detail-amount>—</span>
        </div>
        <div class="ds-obl-detail-row">
          <span class="ds-obl-detail-label">Κατεύθυνση</span>
          <span class="ds-obl-detail-value" data-ds-obl-detail-direction>—</span>
        </div>
        <div class="ds-obl-detail-row">
          <span class="ds-obl-detail-label">Συχνότητα</span>
          <span class="ds-obl-detail-value" data-ds-obl-detail-frequency>—</span>
        </div>
      </div>

      <!-- Period History (the payment grid) -->
      <h3 class="ds-obl-history-title">Ιστορικό Πληρωμών</h3>
      <div class="ds-obl-history-filters">
        <button class="ds-obl-hist-filter active" data-ds-obl-hist-filter="all">Όλα</button>
        <button class="ds-obl-hist-filter" data-ds-obl-hist-filter="paid">Πληρωμένα</button>
        <button class="ds-obl-hist-filter" data-ds-obl-hist-filter="unpaid">Ανεξόφλητα</button>
      </div>
      <div class="ds-obl-history-list" data-ds-obl-history-list>
        <!-- Period rows rendered by JS -->
      </div>

    </div>

    <!-- ── Footer Slot ── -->
    <div data-ds-footer-slot></div>

    <!-- ── Scripts ── -->
    <script src="/driverssystem/js/driverssystem-config.js"></script>
    <script src="/driverssystem/js/auth-gate.js"></script>
    <script src="/driverssystem/js/page-loader.js"></script>
    <script src="/driverssystem/js/footer.js"></script>
    <script src="/driverssystem/js/obligations.js"></script>
  </body>
</html>
