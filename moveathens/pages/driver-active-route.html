<!doctype html>
<html lang="el">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>MoveAthens — Ενεργή Διαδρομή</title>
  <meta name="theme-color" content="#0b0f1a">
  <link rel="icon" type="image/png" sizes="32x32" href="/moveathens/icons/favicon-32x32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/moveathens/icons/apple-touch-icon.png">
  <link rel="manifest" href="/manifest-ma-driver.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="MA Driver">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <style>
    :root {
      --ar-bg: #0b0f1a; --ar-card: #1c2438; --ar-text: #f7f7fb;
      --ar-muted: #b2b8c7; --ar-accent: #46d3ff; --ar-border: rgba(255,255,255,0.06);
      --ar-success: #22c55e; --ar-warn: #f59e0b; --ar-danger: #ef4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--ar-bg); color: var(--ar-text); -webkit-font-smoothing: antialiased; overflow: hidden; }

    /* ── Map (top half) ── */
    #arMap { position: fixed; top: 0; left: 0; right: 0; height: 55vh; z-index: 0; background: #0d1117; }
    .leaflet-control-zoom { display: none !important; }
    .leaflet-control-attribution { font-size: 9px !important; }

    /* ── ETA overlay on map ── */
    .ar-map-eta {
      position: fixed; top: calc(env(safe-area-inset-top, 0px) + 14px); left: 50%; transform: translateX(-50%);
      z-index: 20; display: flex; align-items: center; gap: 8px; padding: 8px 16px;
      border-radius: 12px; background: rgba(28,36,56,0.88); backdrop-filter: blur(10px);
      box-shadow: 0 2px 12px rgba(0,0,0,0.5); font-size: 14px; font-weight: 600; white-space: nowrap;
    }
    .ar-map-eta .eta-time { color: #00c896; }
    .ar-map-eta .eta-sep { color: rgba(255,255,255,0.3); }
    .ar-map-eta .eta-dist { color: rgba(247,247,251,0.7); font-weight: 400; font-size: 12px; }

    /* ── Panel (bottom sliding sheet) ── */
    .ar-wrap { position: fixed; left: 0; right: 0; bottom: 0; z-index: 10;
      max-height: 50vh; overflow-y: auto; border-radius: 20px 20px 0 0;
      background: var(--ar-bg); box-shadow: 0 -4px 24px rgba(0,0,0,0.5);
      padding: env(safe-area-inset-top, 0px) 16px calc(env(safe-area-inset-bottom, 0px) + 8px);
      display: flex; flex-direction: column; }
    .ar-header { padding: 8px 0 4px; display: flex; justify-content: space-between; align-items: center; }
    .ar-drag-handle { width: 40px; height: 4px; border-radius: 2px; background: rgba(255,255,255,0.15);
      margin: 0 auto 6px; flex-shrink: 0; }
    .ar-back { background: none; border: none; color: var(--ar-muted); font-size: 14px; cursor: pointer; padding: 8px 0; }
    .ar-status-badge { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
    .ar-status-accepted { background: rgba(70,211,255,0.15); color: var(--ar-accent); }
    .ar-status-arrived { background: rgba(245,158,11,0.15); color: var(--ar-warn); }
    .ar-status-completed { background: rgba(34,197,94,0.15); color: var(--ar-success); }

    .ar-route { text-align: center; padding: 8px 0 4px; }
    .ar-route-dir { font-size: 12px; color: var(--ar-muted); margin-bottom: 2px; }
    .ar-route-origin, .ar-route-dest { font-size: 16px; font-weight: 600; }
    .ar-route-arrow { font-size: 16px; color: var(--ar-accent); margin: 2px 0; }

    .ar-info { display: flex; flex-direction: column; gap: 8px; padding: 4px 0; }
    .ar-info-card { background: var(--ar-card); border: 1px solid var(--ar-border);
      border-radius: 12px; padding: 14px; }
    .ar-info-row { display: flex; justify-content: space-between; align-items: baseline; padding: 4px 0; }
    .ar-info-label { font-size: 12px; color: var(--ar-muted); }
    .ar-info-value { font-size: 14px; font-weight: 500; text-align: right; max-width: 60%; word-break: break-word; }
    .ar-price { font-size: 20px; font-weight: 700; color: var(--ar-accent); text-align: center; padding: 4px 0; }

    .ar-actions { display: flex; flex-direction: column; gap: 8px; padding: 8px 0 16px; }
    .ar-btn { width: 100%; padding: 14px; border: none; border-radius: 12px; font-size: 15px;
      font-weight: 600; cursor: pointer; transition: opacity 0.15s, transform 0.1s; }
    .ar-btn:active { transform: scale(0.98); }
    .ar-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .ar-btn-primary { background: var(--ar-accent); color: #0b0f1a; }
    .ar-btn-nav { background: #4285f4; color: #fff; }
    .ar-btn-whatsapp { background: #25d366; color: #fff; }
    .ar-btn-complete { background: var(--ar-success); color: #fff; }
    .ar-btn-secondary { background: rgba(255,255,255,0.06); color: var(--ar-muted); border: 1px solid var(--ar-border); }

    .ar-loading { text-align: center; padding: 80px 16px; color: var(--ar-muted); font-size: 14px; }
    .ar-row-pair { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    @media (max-width: 359px) { .ar-route-origin, .ar-route-dest { font-size: 14px; }
      .ar-btn { padding: 12px; font-size: 14px; } }

    /* Driver arrow icon */
    .ar-driver-icon { background: none !important; border: none !important; }
    .ar-driver-icon svg { filter: drop-shadow(0 0 8px rgba(70,211,255,0.6)); }
    /* Pin icons */
    .ar-map-pin { background: none !important; border: none !important; }
    .ar-map-pin svg { filter: drop-shadow(0 2px 6px rgba(0,0,0,0.5)); }

    /* Nav picker sheet */
    .ar-nav-picker-overlay { position: fixed; inset: 0; z-index: 9999; background: rgba(0,0,0,0.5);
      display: flex; align-items: flex-end; justify-content: center; }
    .ar-nav-picker { background: var(--ar-card); border-radius: 16px 16px 0 0; width: 100%; max-width: 400px;
      padding: 20px 16px calc(env(safe-area-inset-bottom, 0px) + 16px); }
    .ar-nav-picker h3 { text-align: center; font-size: 15px; margin-bottom: 14px; color: var(--ar-text); }
    .ar-nav-picker-btns { display: flex; flex-direction: column; gap: 10px; }
    .ar-nav-picker-btn { display: flex; align-items: center; gap: 12px; padding: 14px; border-radius: 12px;
      background: rgba(255,255,255,0.06); border: 1px solid var(--ar-border); cursor: pointer; color: var(--ar-text);
      font-size: 15px; font-weight: 500; text-decoration: none; }
    .ar-nav-picker-btn:active { transform: scale(0.98); }
    .ar-nav-picker-btn svg { width: 28px; height: 28px; flex-shrink: 0; border-radius: 6px; }
    .ar-nav-picker-cancel { text-align: center; padding: 12px; color: var(--ar-muted); font-size: 14px; cursor: pointer; margin-top: 8px; }
  </style>
</head>
<body>

<div id="arMap"></div>
<div id="arMapEta" class="ar-map-eta" style="display:none"></div>

<div class="ar-wrap" id="arWrap">
  <div class="ar-drag-handle"></div>
  <div class="ar-loading" id="arLoading">Φόρτωση διαδρομής…</div>
</div>

<script>
(() => {
  'use strict';

  const params = new URLSearchParams(window.location.search);
  const requestId = params.get('id');
  const LS_KEY = 'moveathens_driver';
  const STATE_KEY = 'ma_dp_route_' + requestId;

  const getPhone = () => {
    try { return JSON.parse(localStorage.getItem(LS_KEY))?.phone || ''; } catch { return ''; }
  };

  let trip = null;
  // States: accepted → arrived → completed (same as driver-accept card)
  let uiState = 'accepted';

  // ── Map variables ──
  let map = null;
  let driverMarker = null;
  let pickupMarker = null;
  let dropoffMarker = null;
  let routeLine = null;
  let driverLine = null;
  let watchId = null;
  let lastHeading = 0;
  let etaRefreshTimer = null;

  function saveState() {
    try { sessionStorage.setItem(STATE_KEY, uiState); } catch { /* */ }
  }
  function loadSavedState() {
    try { return sessionStorage.getItem(STATE_KEY) || null; } catch { return null; }
  }

  function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

  function getGreeting() {
    const h = new Date().getHours();
    return (h >= 5 && h < 12) ? 'Καλημέρα σας,' : 'Καλησπέρα σας,';
  }

  // ── MAP MODULE ──

  const TILES = 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png';

  function makeDriverIcon() {
    return L.divIcon({
      className: 'ar-driver-icon',
      html: `<svg viewBox="0 0 48 48" width="44" height="44" style="transform:rotate(${lastHeading}deg)">
        <circle cx="24" cy="24" r="22" fill="rgba(0,0,0,0.08)"/>
        <circle cx="24" cy="24" r="14" fill="#1a1a2e" stroke="#fff" stroke-width="2.5"/>
        <path d="M24 14 L30 30 L24 26 L18 30 Z" fill="#fff" stroke="none"/>
      </svg>`,
      iconSize: [44, 44],
      iconAnchor: [22, 22]
    });
  }

  const pinA = L.divIcon({
    className: 'ar-map-pin',
    html: `<svg viewBox="0 0 24 36" width="28" height="42"><path d="M12 0C5.4 0 0 5.4 0 12c0 9 12 24 12 24s12-15 12-24C24 5.4 18.6 0 12 0z" fill="#00c896"/><circle cx="12" cy="12" r="5" fill="#fff"/><text x="12" y="15" text-anchor="middle" font-size="8" fill="#00c896" font-weight="bold">A</text></svg>`,
    iconSize: [28, 42], iconAnchor: [14, 42]
  });
  const pinB = L.divIcon({
    className: 'ar-map-pin',
    html: `<svg viewBox="0 0 24 36" width="28" height="42"><path d="M12 0C5.4 0 0 5.4 0 12c0 9 12 24 12 24s12-15 12-24C24 5.4 18.6 0 12 0z" fill="#ff4757"/><circle cx="12" cy="12" r="5" fill="#fff"/><text x="12" y="15" text-anchor="middle" font-size="8" fill="#ff4757" font-weight="bold">B</text></svg>`,
    iconSize: [28, 42], iconAnchor: [14, 42]
  });

  function initMap() {
    const container = document.getElementById('arMap');
    if (!container || map) return;

    map = L.map(container, {
      center: [37.9838, 23.7275], zoom: 12,
      zoomControl: false, attributionControl: false
    });

    L.tileLayer(TILES, { maxZoom: 19, subdomains: 'abcd' }).addTo(map);
    L.control.attribution({ position: 'bottomleft', prefix: false })
      .addAttribution('© <a href="https://carto.com" style="color:#6b7280">CARTO</a>')
      .addTo(map);

    // Apply dark filter (active-route always has dark theme)
    const pane = map.getPane('tilePane');
    if (pane) pane.style.filter = 'invert(100%) hue-rotate(180deg) brightness(92%) contrast(85%) saturate(120%)';

    startGeolocation();
  }

  function startGeolocation() {
    if (!navigator.geolocation) return;
    watchId = navigator.geolocation.watchPosition(
      (pos) => {
        if (pos.coords.heading != null && !isNaN(pos.coords.heading)) lastHeading = pos.coords.heading;
        updateDriverPos(pos.coords.latitude, pos.coords.longitude);
      },
      () => {},
      { enableHighAccuracy: true, maximumAge: 3000, timeout: 15000 }
    );
  }

  function updateDriverPos(lat, lng) {
    if (!map) return;
    const icon = makeDriverIcon();
    if (!driverMarker) {
      driverMarker = L.marker([lat, lng], { icon, zIndexOffset: 1000 }).addTo(map);
    } else {
      driverMarker.setLatLng([lat, lng]);
      driverMarker.setIcon(icon);
    }
  }

  async function fetchOSRM(fromLat, fromLng, toLat, toLng) {
    try {
      const url = `https://router.project-osrm.org/route/v1/driving/${fromLng},${fromLat};${toLng},${toLat}?overview=full&geometries=geojson`;
      const r = await fetch(url);
      if (!r.ok) return null;
      const d = await r.json();
      if (!d.routes || !d.routes.length) return null;
      const route = d.routes[0];
      return { coords: route.geometry.coordinates.map(c => [c[1], c[0]]), distance: route.distance, duration: route.duration };
    } catch { return null; }
  }

  function getPickupDropoff() {
    let pLat, pLng, dLat, dLng;
    if (trip.is_arrival) {
      pLat = parseFloat(trip.destination_lat); pLng = parseFloat(trip.destination_lng);
      dLat = parseFloat(trip.hotel_lat); dLng = parseFloat(trip.hotel_lng);
    } else {
      pLat = parseFloat(trip.hotel_lat); pLng = parseFloat(trip.hotel_lng);
      dLat = parseFloat(trip.destination_lat); dLng = parseFloat(trip.destination_lng);
    }
    return { pLat, pLng, dLat, dLng };
  }

  /** Get the current navigation target based on state */
  function getNavTarget() {
    const { pLat, pLng, dLat, dLng } = getPickupDropoff();
    if (uiState === 'accepted') return { lat: pLat, lng: pLng }; // going to pickup
    if (uiState === 'arrived') return { lat: dLat, lng: dLng }; // going to dropoff
    return null;
  }

  async function drawRoute() {
    if (!map || !trip) return;

    // Clear old
    if (routeLine) { map.removeLayer(routeLine); routeLine = null; }
    if (driverLine) { map.removeLayer(driverLine); driverLine = null; }
    if (pickupMarker) { map.removeLayer(pickupMarker); pickupMarker = null; }
    if (dropoffMarker) { map.removeLayer(dropoffMarker); dropoffMarker = null; }

    const { pLat, pLng, dLat, dLng } = getPickupDropoff();

    // Pins
    if (pLat && pLng) pickupMarker = L.marker([pLat, pLng], { icon: pinA }).addTo(map);
    if (dLat && dLng) dropoffMarker = L.marker([dLat, dLng], { icon: pinB }).addTo(map);

    // OSRM pickup → dropoff (cyan)
    if (pLat && pLng && dLat && dLng) {
      const ab = await fetchOSRM(pLat, pLng, dLat, dLng);
      if (ab && ab.coords.length) {
        routeLine = L.polyline(ab.coords, { color: '#46d3ff', weight: 4, opacity: 0.85 }).addTo(map);
      }
    }

    // OSRM driver → current target (green dashed)
    const target = getNavTarget();
    if (driverMarker && target && target.lat && target.lng) {
      const dPos = driverMarker.getLatLng();
      const dp = await fetchOSRM(dPos.lat, dPos.lng, target.lat, target.lng);
      if (dp && dp.coords.length) {
        driverLine = L.polyline(dp.coords, { color: '#00c896', weight: 3, opacity: 0.7, dashArray: '8 6' }).addTo(map);
        updateEtaOverlay(dp.distance, dp.duration);
      }
    }

    // Fit bounds
    const bounds = L.latLngBounds([]);
    if (pLat && pLng) bounds.extend([pLat, pLng]);
    if (dLat && dLng) bounds.extend([dLat, dLng]);
    if (driverMarker) bounds.extend(driverMarker.getLatLng());
    if (bounds.isValid()) map.fitBounds(bounds, { padding: [50, 30], maxZoom: 14, animate: true });
  }

  function updateEtaOverlay(distMeters, durSeconds) {
    const el = document.getElementById('arMapEta');
    if (!el) return;
    const km = (distMeters / 1000).toFixed(1);
    const mins = Math.max(1, Math.round(durSeconds / 60));
    el.innerHTML = `<span class="eta-time">🚗 ${mins} λεπτά</span><span class="eta-sep">·</span><span class="eta-dist">${km} χλμ</span>`;
    el.style.display = '';
  }

  /** Refresh driver→target ETA every 30s */
  function startEtaRefresh() {
    stopEtaRefresh();
    etaRefreshTimer = setInterval(async () => {
      if (!map || !driverMarker || uiState === 'completed') return;
      const target = getNavTarget();
      if (!target || !target.lat || !target.lng) return;
      const dPos = driverMarker.getLatLng();
      // Redraw driver line
      if (driverLine) { map.removeLayer(driverLine); driverLine = null; }
      const dp = await fetchOSRM(dPos.lat, dPos.lng, target.lat, target.lng);
      if (dp && dp.coords.length) {
        driverLine = L.polyline(dp.coords, { color: '#00c896', weight: 3, opacity: 0.7, dashArray: '8 6' }).addTo(map);
        updateEtaOverlay(dp.distance, dp.duration);
      }
    }, 30000);
  }

  function stopEtaRefresh() {
    if (etaRefreshTimer) { clearInterval(etaRefreshTimer); etaRefreshTimer = null; }
  }

  // ── NAV PICKER (Google Maps / Waze / Apple Maps) ──

  function showNavPicker(lat, lng, label) {
    // Remove existing
    document.querySelector('.ar-nav-picker-overlay')?.remove();

    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
    const googleUrl = `https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}&travelmode=driving`;
    const wazeUrl = `https://waze.com/ul?ll=${lat},${lng}&navigate=yes`;
    const appleUrl = `http://maps.apple.com/?daddr=${lat},${lng}&dirflg=d`;

    // Inline SVG icons (no external URLs)
    const googleIcon = `<svg viewBox="0 0 48 48" width="28" height="28"><circle cx="24" cy="24" r="22" fill="#4285f4"/><path d="M24 12c-6.6 0-12 5.4-12 12s5.4 12 12 12c3.1 0 5.8-1.2 7.8-3.1l-3.2-3.1c-1.2 1-2.8 1.6-4.6 1.6-3.5 0-6.5-2.4-7.6-5.6h-4v3.3C15.1 34.9 19.2 38 24 38c7 0 12-5.4 12-12 0-1-.1-2-.3-2.9H24v5.5h6.9c-.3 1.7-1.3 3.2-2.7 4.1" fill="#fff"/><circle cx="24" cy="24" r="4" fill="#34a853"/></svg>`;
    const wazeIcon = `<svg viewBox="0 0 48 48" width="28" height="28"><circle cx="24" cy="24" r="22" fill="#33ccff"/><circle cx="24" cy="22" r="12" fill="#fff"/><circle cx="20" cy="20" r="2.5" fill="#333"/><circle cx="28" cy="20" r="2.5" fill="#333"/><path d="M19 26c0 0 2 3 5 3s5-3 5-3" stroke="#333" stroke-width="2" fill="none" stroke-linecap="round"/></svg>`;
    const appleIcon = `<svg viewBox="0 0 48 48" width="28" height="28"><circle cx="24" cy="24" r="22" fill="#000"/><path d="M24 12l-8 16 8-4 8 4z" fill="#4cd964"/><path d="M24 28l-8-4 8 16 8-16z" fill="#ff3b30"/></svg>`;

    let btns = `
      <a class="ar-nav-picker-btn" href="${googleUrl}" target="_blank">
        ${googleIcon}
        <span>Google Maps</span>
      </a>
      <a class="ar-nav-picker-btn" href="${wazeUrl}" target="_blank">
        ${wazeIcon}
        <span>Waze</span>
      </a>`;
    if (isIOS) {
      btns += `
      <a class="ar-nav-picker-btn" href="${appleUrl}">
        ${appleIcon}
        <span>Apple Maps</span>
      </a>`;
    }

    const overlay = document.createElement('div');
    overlay.className = 'ar-nav-picker-overlay';
    overlay.innerHTML = `<div class="ar-nav-picker">
      <h3>Πλοήγηση προς ${esc(label || 'προορισμό')}</h3>
      <div class="ar-nav-picker-btns">${btns}</div>
      <div class="ar-nav-picker-cancel" id="navPickerCancel">Ακύρωση</div>
    </div>`;
    document.body.appendChild(overlay);

    overlay.addEventListener('click', (e) => {
      if (e.target === overlay || e.target.id === 'navPickerCancel') overlay.remove();
    });
  }

  // ── Navigation with coordinates or address fallback ──
  function openNavigation(lat, lng, fallbackAddress) {
    let url;
    if (lat && lng) {
      url = 'https://www.google.com/maps/dir/?api=1&destination=' + lat + ',' + lng + '&travelmode=driving';
    } else if (fallbackAddress) {
      url = 'https://www.google.com/maps/dir/?api=1&destination=' + encodeURIComponent(fallbackAddress) + '&travelmode=driving';
    } else {
      return;
    }
    window.open(url, '_blank');
  }

  // ── Build WhatsApp "arrived" message (same format as driver-accept card) ──
  function buildArrivedWhatsAppUrl() {
    if (!trip || !trip.hotel_phone) return null;
    let phone = trip.hotel_phone.replace(/[^0-9+]/g, '');
    if (!phone) return null;
    if (phone.charAt(0) === '+') phone = phone.substring(1);
    if (/^69/.test(phone) || /^21/.test(phone) || /^22/.test(phone)) {
      phone = '30' + phone;
    }
    if (!phone) return null;

    const greeting = getGreeting();
    const details = [];
    if (trip.passenger_name) details.push('Επιβάτη: ' + trip.passenger_name);
    if (trip.is_arrival) {
      details.push('Αφετηρία: ' + (trip.destination_name || '—'));
      details.push('Προορισμό: ' + (trip.hotel_name || '—'));
    } else {
      details.push('Προορισμό: ' + (trip.destination_name || '—'));
    }
    if (trip.room_number) details.push('Δωμάτιο: ' + trip.room_number);
    const detailsText = details.join(' – ');

    let msg;
    if (trip.is_arrival) {
      msg = greeting + '\n\n' +
        'Είμαι ο οδηγός που έχει αναλάβει ' + detailsText + '.\n\n' +
        'Έχω φτάσει στο σημείο παραλαβής (' + (trip.destination_name || '—') + '). Βρίσκομαι εδώ κι έτοιμος να παραλάβω τον επιβάτη.\n\n' +
        'Ευχαριστώ πολύ.';
    } else {
      msg = greeting + '\n\n' +
        'Είμαι ο οδηγός που έχει αναλάβει ' + detailsText + '.\n\n' +
        'Έχω φτάσει στο σημείο παραλαβής. Βρίσκομαι έξω και είμαι έτοιμος για αναχώρηση.\n\n' +
        'Παρακαλώ ενημερώστε τον ότι τον περιμένω.\n\n' +
        'Ευχαριστώ πολύ.';
    }

    return 'https://wa.me/' + phone + '?text=' + encodeURIComponent(msg);
  }

  // ── Load trip data ──
  async function loadTrip() {
    if (!requestId) { showError('Δεν βρέθηκε διαδρομή'); return; }

    try {
      const res = await fetch('/api/driver-panel/active-route/' + encodeURIComponent(requestId));
      if (!res.ok) throw new Error('Not found');
      const data = await res.json();
      trip = data.trip;

      // Determine initial state from server + local storage
      const savedState = loadSavedState();
      if (trip.status === 'completed') {
        uiState = 'completed';
      } else if (trip.status === 'arrived') {
        uiState = 'arrived';
      } else if (trip.status === 'accepted') {
        if (savedState === 'arrived') uiState = 'arrived';
        else uiState = 'accepted';
      } else {
        uiState = 'accepted';
      }

      render();

      // Init map and draw route
      initMap();
      // Small delay for driver position to arrive
      setTimeout(() => { drawRoute(); startEtaRefresh(); }, 800);
    } catch {
      showError('Σφάλμα φόρτωσης');
    }
  }

  function showError(msg) {
    document.getElementById('arLoading').textContent = msg;
  }

  function render() {
    const wrap = document.getElementById('arWrap');
    const dir = trip.is_arrival ? '✈️ Άφιξη' : '🚗 Αναχώρηση';
    const statusClass = uiState === 'completed' ? 'completed' : uiState === 'arrived' ? 'arrived' : 'accepted';
    const statusText = uiState === 'completed' ? 'Ολοκληρώθηκε' : uiState === 'arrived' ? 'Στο σημείο' : 'Ενεργή';

    let infoRows = '';
    if (trip.hotel_name) infoRows += row('Ξενοδοχείο', trip.hotel_name);
    if (trip.hotel_address) infoRows += row('Διεύθυνση', trip.hotel_address);
    if (trip.room_number) infoRows += row('Δωμάτιο', trip.room_number);
    if (trip.passenger_name) infoRows += row('Επιβάτης', trip.passenger_name);
    if (trip.passengers) infoRows += row('Επιβάτες', trip.passengers);
    const totalLuggage = (trip.luggage_large || 0) + (trip.luggage_medium || 0) + (trip.luggage_cabin || 0);
    if (totalLuggage) infoRows += row('Αποσκευές', totalLuggage);
    if (trip.flight_number) infoRows += row('Πτήση', trip.flight_number);
    if (trip.scheduled_date) infoRows += row('Ημ/νία', `${trip.scheduled_date} ${trip.scheduled_time || ''}`);
    if (trip.notes) infoRows += row('Σημειώσεις', trip.notes);

    // ── Hybrid button system (same as driver-accept card) ──
    let actionsHTML = '';
    let statusMsg = '';

    if (uiState === 'accepted') {
      // Primary: Navigate to first point, Secondary: "Έφτασα" (sends WhatsApp)
      const navLabel = trip.is_arrival
        ? '🧭 Πλοήγηση προς Σημείο Παραλαβής'
        : '🧭 Πλοήγηση προς Ξενοδοχείο';
      actionsHTML = `
        <button class="ar-btn ar-btn-nav" id="arPrimary">${navLabel}</button>
        <button class="ar-btn ar-btn-whatsapp" id="arSecondary">📍 Έφτασα</button>`;
      statusMsg = trip.is_arrival
        ? 'Πάτα πλοήγηση για να πας στο σημείο παραλαβής.'
        : 'Πάτα πλοήγηση για να πας στο ξενοδοχείο.';
    } else if (uiState === 'arrived') {
      // Primary: Navigate to final destination, Secondary: "Ολοκλήρωση"
      const navLabel = trip.is_arrival
        ? '🧭 Πλοήγηση προς Ξενοδοχείο'
        : '🧭 Πλοήγηση προς Τελικό Προορισμό';
      actionsHTML = `
        <button class="ar-btn ar-btn-nav" id="arPrimary">${navLabel}</button>
        <button class="ar-btn ar-btn-complete" id="arSecondary">🏁 Ολοκλήρωση Διαδρομής</button>`;
      statusMsg = trip.is_arrival
        ? 'Παρέλαβες τον επιβάτη! Πάτα πλοήγηση για το ξενοδοχείο.'
        : 'Ενημέρωσες τον ξενοδόχο! Πάτα πλοήγηση για τον τελικό προορισμό.';
    } else {
      actionsHTML = `
        <button class="ar-btn ar-btn-secondary" id="arBack">← Πίσω στο Panel</button>`;
      statusMsg = 'Η διαδρομή ολοκληρώθηκε. Ευχαριστούμε!';
    }

    wrap.innerHTML = `
      <div class="ar-drag-handle"></div>
      <div class="ar-header">
        <button class="ar-back" id="arBackBtn">← Πίσω</button>
        <span class="ar-status-badge ar-status-${statusClass}">${statusText}</span>
      </div>
      <div class="ar-route">
        <div class="ar-route-dir">${dir}</div>
        <div class="ar-route-origin">${esc(trip.origin)}</div>
        <div class="ar-route-arrow">↓</div>
        <div class="ar-route-dest">${esc(trip.destination)}</div>
      </div>
      <div class="ar-price">${(parseFloat(trip.price) || 0).toFixed(0)}€</div>
      <div class="ar-info">
        <div class="ar-info-card">${infoRows || '<div style="text-align:center;color:var(--ar-muted)">Χωρίς επιπλέον πληροφορίες</div>'}</div>
      </div>
      <div class="ar-status-msg" style="text-align:center;padding:4px 0 8px;font-size:13px;color:var(--ar-accent)">${esc(statusMsg)}</div>
      <div class="ar-actions">${actionsHTML}</div>`;

    // Bind events after render
    document.getElementById('arBackBtn')?.addEventListener('click', goBack);
    document.getElementById('arBack')?.addEventListener('click', goBack);

    const primary = document.getElementById('arPrimary');
    const secondary = document.getElementById('arSecondary');

    if (primary) primary.addEventListener('click', handlePrimary);
    if (secondary) secondary.addEventListener('click', handleSecondary);
  }

  function row(label, value) {
    return `<div class="ar-info-row"><span class="ar-info-label">${esc(label)}</span><span class="ar-info-value">${esc(String(value))}</span></div>`;
  }

  // ── PRIMARY BUTTON: Navigate (opens picker) ──
  function handlePrimary() {
    if (uiState === 'accepted') {
      if (trip.is_arrival) {
        showNavPicker(trip.destination_lat, trip.destination_lng, trip.destination_name || 'Σημείο Παραλαβής');
      } else {
        const lat = trip.hotel_lat, lng = trip.hotel_lng;
        if (lat && lng) {
          showNavPicker(lat, lng, trip.hotel_name || 'Ξενοδοχείο');
        } else {
          const hotelAddr = [trip.hotel_name, trip.hotel_address, trip.hotel_municipality].filter(Boolean).join(', ');
          openNavigation(null, null, hotelAddr || 'Athens');
        }
      }
    } else if (uiState === 'arrived') {
      if (trip.is_arrival) {
        const lat = trip.hotel_lat, lng = trip.hotel_lng;
        if (lat && lng) {
          showNavPicker(lat, lng, trip.hotel_name || 'Ξενοδοχείο');
        } else {
          const hotelAddr = [trip.hotel_name, trip.hotel_address, trip.hotel_municipality].filter(Boolean).join(', ');
          openNavigation(null, null, hotelAddr || 'Athens');
        }
      } else {
        showNavPicker(trip.destination_lat, trip.destination_lng, trip.destination_name || 'Προορισμός');
      }
    }
  }

  // ── SECONDARY BUTTON: Arrived / Complete ──
  async function handleSecondary() {
    const phone = getPhone();

    if (uiState === 'accepted') {
      // ── "ΕΦΤΑΣΑ" — notify hotel via correct channel ──
      if (trip && trip.channel === 'email') {
        // Email channel: server sends email automatically
        const msgEl = document.getElementById('arStatusMsg');
        if (msgEl) { msgEl.textContent = 'Αποστολή email στο ξενοδοχείο…'; }
      } else {
        // WhatsApp channel: open WhatsApp with pre-filled message
        const waUrl = buildArrivedWhatsAppUrl();
        if (waUrl) {
          window.open(waUrl, '_blank');
        }
      }

      // Mark arrived on server (also sends email if channel=email)
      try {
        await fetch(`/api/driver-panel/active-route/${encodeURIComponent(requestId)}/status`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ status: 'arrived', phone })
        });
      } catch { /* non-blocking */ }

      uiState = 'arrived';
      saveState();
      render();
      drawRoute(); // Redraw route for new target

    } else if (uiState === 'arrived') {
      // ── "ΟΛΟΚΛΗΡΩΣΗ" ──
      const btn = document.getElementById('arSecondary');
      if (btn) { btn.disabled = true; btn.textContent = 'Αποστολή…'; }

      try {
        const res = await fetch(`/api/driver-panel/active-route/${encodeURIComponent(requestId)}/status`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ status: 'completed', phone })
        });
        const data = await res.json();
        if (data.ok) {
          uiState = 'completed';
          saveState();
          stopEtaRefresh();
          try { localStorage.removeItem('ma_dp_active_route'); } catch {}
          const etaEl = document.getElementById('arMapEta');
          if (etaEl) etaEl.style.display = 'none';
          render();
        } else {
          if (btn) { btn.disabled = false; btn.textContent = '🏁 Ολοκλήρωση Διαδρομής'; }
        }
      } catch {
        if (btn) { btn.disabled = false; btn.textContent = '🏁 Ολοκλήρωση Διαδρομής'; }
      }
    }
  }

  function goBack() {
    window.location.href = '/moveathens/driver';
  }

  loadTrip();
})();
</script>
<script src="/js/pwa-install-prompt.js" defer></script>
</body>
</html>
