<!doctype html>
<html lang="el">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <title>MoveAthens - Μενού</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/moveathens/icons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/moveathens/icons/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/moveathens/icons/apple-touch-icon.png">
    <link rel="stylesheet" href="/moveathens/css/auth-gate.css" />
    <script>if(!localStorage.getItem('moveathens_hotel')){document.documentElement.className+=' ma-gate-pending'};(function(){var t=localStorage.getItem('ma_theme_preference');if(t==='light')document.documentElement.classList.add('ma-force-light');else if(t==='dark')document.documentElement.classList.add('ma-force-dark')})()</script>
    <link rel="stylesheet" href="/moveathens/css/page-loader.css" />
    <link rel="preload" href="/moveathens/videos/hero-logo.webp" as="image" type="image/webp" />
    <link rel="stylesheet" href="/moveathens/css/moveathens-base.css" />
    <link rel="stylesheet" href="/moveathens/css/footer.css" />
    <link rel="stylesheet" href="/moveathens/css/hotel-hub.css" />
    <link rel="stylesheet" href="/moveathens/css/dark-mode.css" />
    <link rel="manifest" href="/manifest-moveathens.json">
    <meta name="theme-color" content="#0b0f1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="MoveAthens">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  </head>
  <body class="ma-page ma-hub-page">

    <main class="ma-main">

      <!-- ── Hotel Identity Header ── -->
      <section class="ma-hub-header">
        <div class="ma-hub-avatar" id="hub-avatar"></div>
        <h2 class="ma-hub-name" id="hub-hotel-name"></h2>
        <p class="ma-hub-detail" id="hub-hotel-phone"></p>
        <p class="ma-hub-detail" id="hub-hotel-email"></p>
      </section>

      <!-- ── Menu Cards ── -->
      <nav class="ma-hub-menu">
        <a href="/moveathens/hotel/profile" class="ma-hub-card" data-route="/moveathens/hotel/profile">
          <span class="ma-hub-card__icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18"/><path d="M5 21V7l7-4 7 4v14"/><path d="M9 21v-4h6v4"/><path d="M9 10h1"/><path d="M14 10h1"/><path d="M9 14h1"/><path d="M14 14h1"/></svg>
          </span>
          <div class="ma-hub-card__text">
            <span class="ma-hub-card__title">Προφίλ Ξενοδοχείου</span>
            <span class="ma-hub-card__desc">Στοιχεία, τηλέφωνα & πληροφορίες</span>
          </div>
          <span class="ma-hub-card__arrow">›</span>
        </a>

        <a href="/moveathens/hotel/revenue" class="ma-hub-card" data-route="/moveathens/hotel/revenue">
          <span class="ma-hub-card__icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="12" width="4" height="9" rx="1"/><rect x="10" y="7" width="4" height="14" rx="1"/><rect x="17" y="3" width="4" height="18" rx="1"/></svg>
          </span>
          <div class="ma-hub-card__text">
            <span class="ma-hub-card__title">Ανάλυση Εσόδων</span>
            <span class="ma-hub-card__desc">Στατιστικά, διαδρομές & μηνιαία ανάλυση</span>
          </div>
          <span class="ma-hub-card__arrow">›</span>
        </a>

        <a href="/moveathens/hotel/settings" class="ma-hub-card" data-route="/moveathens/hotel/settings">
          <span class="ma-hub-card__icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1.08-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1.08 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h.08a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v.08a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          </span>
          <div class="ma-hub-card__text">
            <span class="ma-hub-card__title">Ρυθμίσεις Εφαρμογής</span>
            <span class="ma-hub-card__desc">Εμφάνιση & θέμα εφαρμογής</span>
          </div>
          <span class="ma-hub-card__arrow">›</span>
        </a>
      </nav>

      <!-- ── Logout ── -->
      <div class="ma-hub-logout">
        <button class="ma-hub-logout-btn" id="hotel-logout-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:6px"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Αποσύνδεση
        </button>
      </div>

      <!-- Version Badge -->
      <div class="ma-version-badge" id="ma-version-badge">
        <span class="ma-version-badge__label">Έκδοση:</span>
        <span class="ma-version-badge__value" id="ma-version-value">—</span>
        <span class="ma-version-badge__build" id="ma-version-build"></span>
      </div>
    </main>

    <div data-ma-modal-slot></div>
    <div data-ma-footer-slot></div>

    <script src="/moveathens/js/auth-gate.js"></script>
    <script src="/moveathens/js/page-loader.js" defer></script>
    <script src="/moveathens/js/network-status.js" defer></script>
    <script src="/moveathens/js/moveathens-config.js"></script>
    <script src="/moveathens/js/contact-modal.js"></script>
    <script src="/moveathens/js/footer.js"></script>
    <script src="/moveathens/js/hotel-hub.js"></script>
    <script src="/moveathens/js/moveathens-pwa.js" defer></script>
    <script src="/js/pwa-install-prompt.js" defer></script>
  </body>
</html>
