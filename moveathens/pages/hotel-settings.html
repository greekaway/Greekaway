<!doctype html>
<html lang="el">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <title>MoveAthens - Ρυθμίσεις</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/moveathens/icons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/moveathens/icons/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/moveathens/icons/apple-touch-icon.png">
    <link rel="stylesheet" href="/moveathens/css/auth-gate.css" />
    <script>if(!localStorage.getItem('moveathens_hotel')){document.documentElement.className+=' ma-gate-pending'};(function(){var t=localStorage.getItem('ma_theme_preference');if(t==='light')document.documentElement.classList.add('ma-force-light');else if(t==='dark')document.documentElement.classList.add('ma-force-dark')})()</script>
    <link rel="stylesheet" href="/moveathens/css/page-loader.css" />
    <link rel="stylesheet" href="/moveathens/css/moveathens-base.css" />
    <link rel="stylesheet" href="/moveathens/css/footer.css" />
    <link rel="stylesheet" href="/moveathens/css/hotel-sub.css" />
    <link rel="stylesheet" href="/moveathens/css/hotel-settings.css" />
    <link rel="stylesheet" href="/moveathens/css/dark-mode.css" />
    <meta name="theme-color" content="#001f3f">
  </head>
  <body class="ma-page">

    <main class="ma-main">

      <!-- ── Back navigation + Title ── -->
      <div class="ma-sub-header">
        <a href="/moveathens/hotel" class="ma-sub-back-btn" data-route="/moveathens/hotel" aria-label="Πίσω">
          <span class="ma-sub-back-chevron"></span>
        </a>
        <h2 class="ma-sub-header__title">Ρυθμίσεις Εφαρμογής</h2>
      </div>

      <!-- ── Theme Setting ── -->
      <section class="ma-card ma-section">
        <h3 class="ma-settings-label">Εμφάνιση</h3>
        <p class="ma-settings-hint">Επιλέξτε τη λειτουργία εμφάνισης της εφαρμογής</p>
        <div class="ma-theme-selector" id="theme-selector">
          <button class="ma-theme-btn" data-theme="auto">
            <span class="ma-theme-btn__icon">🔄</span>
            <span class="ma-theme-btn__label">Αυτόματο</span>
          </button>
          <button class="ma-theme-btn" data-theme="light">
            <span class="ma-theme-btn__icon">☀️</span>
            <span class="ma-theme-btn__label">Φωτεινό</span>
          </button>
          <button class="ma-theme-btn" data-theme="dark">
            <span class="ma-theme-btn__icon">🌙</span>
            <span class="ma-theme-btn__label">Σκοτεινό</span>
          </button>
        </div>
      </section>

      <!-- ── Security PIN Setting ── -->
      <section class="ma-card ma-section" id="pin-section">
        <h3 class="ma-settings-label">🔐 Κωδικός Ασφαλείας (PIN)</h3>
        <p class="ma-settings-hint">Ορίστε ένα PIN για επιπλέον ασφάλεια κατά τη σύνδεση</p>

        <div id="pin-status" class="ma-pin-status">
          <span class="ma-pin-status__icon" id="pin-status-icon">—</span>
          <span class="ma-pin-status__text" id="pin-status-text">Φόρτωση...</span>
        </div>

        <div id="pin-form-wrap" class="ma-pin-form" style="display:none">
          <label class="ma-settings-hint" for="pin-input" id="pin-form-label">Νέος κωδικός (τουλάχιστον 4 χαρακτήρες)</label>
          <input class="ma-pin-input" type="password" id="pin-input"
                 placeholder="Εισάγετε κωδικό" inputmode="numeric"
                 minlength="4" maxlength="20" autocomplete="new-password" />
          <input class="ma-pin-input" type="password" id="pin-input-confirm"
                 placeholder="Επιβεβαίωση κωδικού" inputmode="numeric"
                 minlength="4" maxlength="20" autocomplete="new-password" />
          <div class="ma-pin-actions">
            <button class="ma-pin-btn ma-pin-btn--save" id="pin-save-btn" type="button">Αποθήκευση</button>
            <button class="ma-pin-btn ma-pin-btn--cancel" id="pin-cancel-btn" type="button">Ακύρωση</button>
          </div>
          <p class="ma-pin-error" id="pin-error"></p>
        </div>

        <div id="pin-actions-wrap" class="ma-pin-main-actions" style="display:none">
          <button class="ma-pin-btn ma-pin-btn--set" id="pin-set-btn" type="button">Ορισμός PIN</button>
          <button class="ma-pin-btn ma-pin-btn--change" id="pin-change-btn" type="button" style="display:none">Αλλαγή PIN</button>
          <button class="ma-pin-btn ma-pin-btn--remove" id="pin-remove-btn" type="button" style="display:none">Αφαίρεση PIN</button>
        </div>
      </section>



    </main>

    <div data-ma-modal-slot></div>
    <div data-ma-footer-slot></div>

    <script src="/moveathens/js/auth-gate.js"></script>
    <script src="/moveathens/js/page-loader.js" defer></script>
    <script src="/moveathens/js/network-status.js" defer></script>
    <script src="/moveathens/js/moveathens-config.js"></script>
    <script src="/moveathens/js/contact-modal.js"></script>
    <script src="/moveathens/js/footer.js"></script>
    <script src="/moveathens/js/hotel-settings.js"></script>
  </body>
</html>
