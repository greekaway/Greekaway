<!doctype html>
<html lang="el">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <title>MoveAthens Driver</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/moveathens/icons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/moveathens/icons/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/moveathens/icons/apple-touch-icon.png">
    <link rel="manifest" href="/manifest-ma-driver.json">
    <meta name="theme-color" content="#0b0f1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="MA Driver">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- Auth gate: hide everything before JS runs -->
    <script>if(!localStorage.getItem('moveathens_driver')){document.documentElement.className+=' ma-dp-gate-pending'};(function(){var t=localStorage.getItem('ma_dp_theme')||'auto';if(t==='light')document.documentElement.setAttribute('data-theme','light');else if(t==='dark')document.documentElement.setAttribute('data-theme','dark');else if(window.matchMedia&&window.matchMedia('(prefers-color-scheme:light)').matches)document.documentElement.setAttribute('data-theme','light')})()</script>

    <link rel="stylesheet" href="/moveathens/css/driver-panel.css" />
    <link rel="stylesheet" href="/moveathens/css/driver-panel-auth.css" />
    <link rel="stylesheet" href="/moveathens/css/driver-panel-home.css" />
    <link rel="stylesheet" href="/moveathens/css/driver-panel-appointments.css" />
    <link rel="stylesheet" href="/moveathens/css/driver-panel-history.css" />
    <link rel="stylesheet" href="/moveathens/css/driver-panel-financials.css" />
    <link rel="stylesheet" href="/moveathens/css/driver-panel-profile.css" />
    <link rel="stylesheet" href="/moveathens/css/driver-panel-push.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link rel="stylesheet" href="/moveathens/css/driver-panel-map.css" />
  </head>
  <body>

    <!-- ════════════ MAIN CONTENT (hidden until auth) ════════════ -->
    <div id="dpApp" class="ma-dp-app">

      <!-- ──── HEADER BAR (home only) ──── -->
      <header class="ma-dp-header" id="dpHeader">
        <img class="ma-dp-header__logo" id="dpHeaderLogo" alt="Logo" src="/moveathens/videos/hero-logo.png">
        <span class="ma-dp-header__title" id="dpHeaderTitle">MoveAthens Driver</span>
      </header>

      <!-- ──── TAB: Αρχική ──── -->
      <section class="ma-dp-tab active" data-tab="home">
        <!-- Populated by driver-panel-home.js -->
      </section>

      <!-- ──── TAB: Ραντεβού ──── -->
      <section class="ma-dp-tab" data-tab="schedule">
        <!-- Populated by driver-panel-appointments.js -->
      </section>

      <!-- ──── TAB: Ιστορικό ──── -->
      <section class="ma-dp-tab" data-tab="history">
        <!-- Populated by driver-panel-history.js -->
      </section>

      <!-- ──── TAB: Οικονομικά ──── -->
      <section class="ma-dp-tab" data-tab="finance">
        <!-- Populated by driver-panel-financials.js -->
      </section>

      <!-- ──── TAB: Προφίλ ──── -->
      <section class="ma-dp-tab" data-tab="profile">
        <div class="ma-dp-profile" id="dpProfile">
          <!-- Populated by driver-panel-profile.js -->
        </div>
      </section>

      <!-- ──── FOOTER NAVIGATION ──── -->
      <nav class="ma-dp-footer" id="dpFooter" aria-label="Driver navigation">
        <!-- Populated by driver-panel.js from config -->
      </nav>

    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="/moveathens/js/driver-panel-map.js"></script>
    <script src="/moveathens/js/driver-panel-auth.js"></script>
    <script src="/moveathens/js/dp-sounds.js"></script>
    <script src="/moveathens/js/driver-panel-home.js"></script>
    <script src="/moveathens/js/driver-panel-appointments.js"></script>
    <script src="/moveathens/js/driver-panel-history.js"></script>
    <script src="/moveathens/js/driver-panel-financials.js"></script>
    <script src="/moveathens/js/driver-panel-profile.js"></script>
    <script src="/moveathens/js/driver-panel.js"></script>
    <script src="/moveathens/js/driver-panel-push.js"></script>
    <script src="/js/pwa-install-prompt.js" defer></script>
  </body>
</html>
