<!doctype html>
<html lang="el">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/png" sizes="32x32" href="/moveathens/icons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/moveathens/icons/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/moveathens/icons/apple-touch-icon.png">
    <link rel="stylesheet" href="/moveathens/css/auth-gate.css" />
    <script>if(!localStorage.getItem('moveathens_hotel')){document.documentElement.className+=' ma-gate-pending'}</script>
    <link rel="stylesheet" href="/moveathens/css/page-loader.css" />
    <!-- Preload critical assets -->
    <link rel="preload" href="/moveathens/videos/hero-logo.png" as="image" />
    <link rel="preload" href="/moveathens/css/moveathens-base.css" as="style" />
    <link rel="preload" href="/moveathens/css/welcome.css" as="style" />
    <link rel="stylesheet" href="/moveathens/css/moveathens-base.css" />
    <link rel="stylesheet" href="/moveathens/css/footer.css" />
    <link rel="stylesheet" href="/moveathens/css/welcome.css" />
  </head>
  <body class="ma-hero-page">
    <main class="ma-hero-stage">
      <section class="ma-hero">
        <div class="ma-hero__media">
          <video data-ma-hero-video autoplay muted loop playsinline></video>
          <div class="ma-hero__placeholder ma-placeholder" data-ma-hero-placeholder></div>
        </div>
        <div class="ma-hero__scrim"></div>
        <div class="ma-hero__overlay">
          <img class="ma-hero__logo" data-ma-hero-logo alt="MoveAthens" fetchpriority="high" />
          <div class="ma-hero__text-group">
            <h1 class="ma-hero__headline" data-ma-hero-headline></h1>
            <p class="ma-hero__subtext" data-ma-hero-subtext></p>
          </div>
          <div class="ma-metrics" data-ma-metrics>
            <div class="ma-metrics__card" data-ma-metric="hotels">
              <span class="ma-metrics__value" data-ma-metric-value>—</span>
              <span class="ma-metrics__label" data-ma-metric-label></span>
            </div>
            <div class="ma-metrics__card" data-ma-metric="routes">
              <span class="ma-metrics__value" data-ma-metric-value>—</span>
              <span class="ma-metrics__label" data-ma-metric-label></span>
            </div>
            <div class="ma-metrics__card" data-ma-metric="destinations">
              <span class="ma-metrics__value" data-ma-metric-value>—</span>
              <span class="ma-metrics__label" data-ma-metric-label></span>
            </div>
            <div class="ma-metrics__card" data-ma-metric="categories">
              <span class="ma-metrics__value" data-ma-metric-value>—</span>
              <span class="ma-metrics__label" data-ma-metric-label></span>
            </div>
          </div>
        </div>
      </section>
    </main>

    <div data-ma-modal-slot></div>
    <div data-ma-footer-slot></div>

    <script src="/moveathens/js/auth-gate.js"></script>
    <script src="/moveathens/js/page-loader.js" defer></script>
    <script src="/moveathens/js/moveathens-config.js"></script>
    <script src="/moveathens/js/contact-modal.js"></script>
    <script src="/moveathens/js/footer.js"></script>
    <script src="/moveathens/js/welcome.js"></script>
  </body>
</html>
