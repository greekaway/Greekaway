<!doctype html>
<html lang="el">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <title>MoveAthens - AI Βοηθός</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/moveathens/icons/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/moveathens/icons/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/moveathens/icons/apple-touch-icon.png">
  <link rel="stylesheet" href="/moveathens/css/auth-gate.css">
  <script>if(!localStorage.getItem('moveathens_hotel')){document.documentElement.className+=' ma-gate-pending'};(function(){var t=localStorage.getItem('ma_theme_preference');if(t==='light')document.documentElement.classList.add('ma-force-light');else if(t==='dark')document.documentElement.classList.add('ma-force-dark')})()</script>
  <link rel="stylesheet" href="/moveathens/css/page-loader.css">
  <link rel="stylesheet" href="/moveathens/css/moveathens-base.css">
  <link rel="stylesheet" href="/moveathens/css/dark-mode.css">
  <link rel="stylesheet" href="/moveathens/css/chat.css">
  <style>
    html, body {
      height: 100%;
      overflow: hidden;
    }
    
    .ma-ai-page {
      height: 100%;
      height: 100dvh;
      background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
    }
    
    .ma-ai-header {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px 16px;
      flex-shrink: 0;
      position: relative;
      z-index: 10;
    }
    
    .ma-ai-back {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      width: 40px;
      height: 40px;
      border-radius: 12px;
      border: none;
      background: rgba(0,0,0,0.06);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.2s;
    }
    .ma-ai-back:active {
      background: rgba(0,0,0,0.12);
    }
    .ma-ai-back svg {
      width: 20px;
      height: 20px;
      stroke: #1a2232;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    
    .ma-ai-live-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 700;
      color: #4CAF50;
      letter-spacing: 0.5px;
    }
    
    .ma-ai-live-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4CAF50;
      animation: ma-live-pulse 2s ease-in-out infinite;
    }
    
    @keyframes ma-live-pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(76, 175, 80, 0.4); }
      50% { opacity: 0.7; box-shadow: 0 0 0 6px rgba(76, 175, 80, 0); }
    }
    
    .ma-ai-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }
    
    #maChatContainer {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }
    
    /* Dark mode */
    @media (prefers-color-scheme: dark) {
      .ma-ai-page {
        background: linear-gradient(135deg, #1a1a2e 0%, #16161f 100%);
      }
      .ma-ai-back {
        background: rgba(255,255,255,0.1);
      }
      .ma-ai-back:active {
        background: rgba(255,255,255,0.18);
      }
      .ma-ai-back svg {
        stroke: #e8ebf0;
      }
      .ma-ai-live-badge {
        color: #66bb6a;
      }
      .ma-ai-live-dot {
        background: #66bb6a;
      }
    }
  </style>
  <link rel="manifest" href="/manifest-moveathens.json">
  <meta name="theme-color" content="#0b0f1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="MoveAthens">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body class="ma-ai-page">
  <header class="ma-ai-header">
    <button class="ma-ai-back" onclick="window.history.back()" aria-label="Πίσω">
      <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <span class="ma-ai-live-badge">
      <span class="ma-ai-live-dot"></span>
      LIVE
    </span>
  </header>

  <main class="ma-ai-content">
    <div id="maChatContainer"></div>
  </main>

  <script src="/moveathens/js/auth-gate.js"></script>
  <script src="/moveathens/js/page-loader.js" defer></script>
  <script src="/moveathens/js/network-status.js" defer></script>
  <script src="/moveathens/js/moveathens-config.js"></script>
  <script src="/moveathens/js/chat.js"></script>
  <script>
    // iOS keyboard fix - keep layout stable
    (function() {
      const page = document.querySelector('.ma-ai-page');
      const input = document.getElementById('maChatInput');
      
      if (!page || !input) return;
      
      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', function() {
          page.style.height = window.visualViewport.height + 'px';
        });
        
        window.visualViewport.addEventListener('scroll', function() {
          window.scrollTo(0, 0);
        });
      }
      
      input.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
          setTimeout(function() { window.scrollTo(0, 0); }, 100);
        }
      });
      
      input.addEventListener('blur', function() {
        setTimeout(function() {
          window.scrollTo(0, 0);
          if (page) page.style.height = '';
        }, 100);
      });
    })();
  </script>
  <script src="/moveathens/js/moveathens-pwa.js" defer></script>
  <script src="/js/pwa-install-prompt.js" defer></script>
</body>
</html>
