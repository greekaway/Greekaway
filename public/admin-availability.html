<!doctype html>
<html lang="el">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Greekaway Admin – Availability</title>
  <link rel="stylesheet" href="/css/admin-common.css">
  <link rel="stylesheet" href="/css/admin-availability.css">
  <link rel="stylesheet" href="/css/admin-tables.css">
  <link rel="stylesheet" href="/css/admin-theme-toggle.css">
  <link rel="manifest" href="/manifest-admin.json">
  <meta name="theme-color" content="#001f3f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Greekaway Admin">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="stylesheet" href="/pwa.css">
  <link rel="stylesheet" href="/css/pwa-fixes.css">
  </head>
<body>
  <header class="sticky-bar" aria-label="Availability — Φίλτρα" data-collapsed="false">
    <div class="bar-inner">
      <div class="title">Availability</div>
      <button id="toggleFilters" class="filters-toggle" aria-label="Εμφάνιση/Απόκρυψη φίλτρων" aria-expanded="true">▲</button>
  <form id="filters" class="filters" onsubmit="return false;">
        <label>Από
          <input type="date" id="from">
        </label>
        <label>Έως
          <input type="date" id="to">
        </label>
        <label>Trip
          <input type="text" id="trip" placeholder="Όνομα Trip">
        </label>
        <label>Status
          <select id="statusFilter">
            <option value="all">Όλοι</option>
            <option value="green">🟢 Πράσινοι</option>
            <option value="orange">🟠 Πορτοκαλί</option>
            <option value="red">🔴 Κόκκινοι</option>
          </select>
        </label>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn secondary" id="resetFilters" type="button">Μηδενισμός φίλτρων</button>
        </div>
      </form>
      
    </div>
  </header>
  

  <main class="content-wrap">
  </main>

  <script src="/js/admin-seeds.js"></script>
  <script src="/js/admin-availability.js"></script>
  <script src="/js/admin-theme-toggle.js"></script>
  <script src="/js/admin-pwa.js" defer></script>
  <script src="/js/pwa-install-prompt.js" defer></script>
  <script src="/js/main.js"></script>

  <script>
    fetch('/version.json').then(r=>r.ok?r.json():null).then(v=>{
      if(v){ document.getElementById('ga-version').textContent = v.version || '—' }
    });
    document.addEventListener('DOMContentLoaded',()=>{
      const header=document.querySelector('header.sticky-bar');
      const btn=document.getElementById('toggleFilters');
      if(header&&btn){
        btn.addEventListener('click',()=>{
          const cur=header.getAttribute('data-collapsed')==='true';
          header.setAttribute('data-collapsed',cur? 'false':'true');
          btn.setAttribute('aria-expanded',cur? 'true':'false');
          btn.textContent = (cur? '▲':'▼');
        });
      }
    });
  </script>
  <script src="/admin/js/admin-greekaway-tabs.js"></script>
  <script src="/admin/js/admin-footer.js"></script>
</body>
</html>
